openapi: 3.0.3
info:
  title: OpenChat Chat Upgrade API
  version: 1.1.0
  description: |
    Upgrade contract for chat streaming and rich message capabilities.
    This file is designed for SDK implementation agents and must be treated
    as the source of truth before code generation.
servers:
  - url: https://api.example.com
    description: Production placeholder
  - url: https://staging-api.example.com
    description: Staging placeholder
tags:
  - name: ChatUpgrade
    description: Upgraded chat APIs for streaming and rich payloads
paths:
  /app/v3/api/chat/sessions/{sessionId}/messages/stream:
    post:
      tags: [ChatUpgrade]
      summary: Stream chat response with SSE events
      operationId: chatStreamMessage
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatStreamRequest'
      responses:
        '200':
          description: SSE stream started successfully
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ChatStreamEvent'
              examples:
                delta:
                  value: |
                    event: delta
                    data: {"streamId":"st_123","requestId":"req_001","code":"2000","msg":"ok","data":{"chunk":"Hello","index":0}}
                done:
                  value: |
                    event: done
                    data: {"streamId":"st_123","requestId":"req_001","code":"2000","msg":"completed","data":{"finishReason":"stop","usage":{"promptTokens":20,"completionTokens":55,"totalTokens":75}}}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlusApiErrorResult'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlusApiErrorResult'
        '409':
          description: Session conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlusApiErrorResult'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlusApiErrorResult'

  /app/v3/api/chat/sessions/{sessionId}/streams/{streamId}:cancel:
    post:
      tags: [ChatUpgrade]
      summary: Cancel streaming generation by stream ID
      operationId: cancelChatStream
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/StreamId'
      responses:
        '200':
          description: Stream canceled (idempotent success)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlusApiResultVoid'
              example:
                code: "2000"
                msg: "ok"
                requestId: "req_002"
                data: {}
                errorName: ""
        '404':
          description: Stream not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlusApiErrorResult'
        '409':
          description: Stream already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlusApiErrorResult'

  /app/v3/api/chat/sessions/{sessionId}/messages/rich:
    post:
      tags: [ChatUpgrade]
      summary: Send rich multimodal chat message
      operationId: sendRichChatMessage
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RichChatMessageRequest'
      responses:
        '200':
          description: Rich message sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlusApiResultChatMessageVO'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlusApiErrorResult'
        '422':
          description: Unsupported modality or invalid attachment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlusApiErrorResult'

components:
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    StreamId:
      name: streamId
      in: path
      required: true
      schema:
        type: string

  schemas:
    PlusApiErrorResult:
      type: object
      required: [code, msg, requestId]
      properties:
        code:
          type: string
          example: "4001"
        msg:
          type: string
          example: "invalid request"
        requestId:
          type: string
          example: req_error_001
        errorName:
          type: string
          example: INVALID_ARGUMENT
        details:
          type: object
          additionalProperties: true

    PlusApiResultVoid:
      type: object
      required: [code, msg, requestId, data]
      properties:
        code:
          type: string
          example: "2000"
        msg:
          type: string
          example: ok
        requestId:
          type: string
          example: req_001
        data:
          type: object
          additionalProperties: true
        errorName:
          type: string
          example: ""

    ChatMessageVO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        sessionId:
          type: integer
          format: int64
        content:
          type: string
        thinking:
          type: string
        status:
          type: string
          enum: [pending, success, failed]
        senderType:
          type: string
          enum: [user, ai, system]
        createTime:
          type: string
          format: date-time
        updateTime:
          type: string
          format: date-time

    PlusApiResultChatMessageVO:
      type: object
      required: [code, msg, requestId, data]
      properties:
        code:
          type: string
          example: "2000"
        msg:
          type: string
          example: ok
        requestId:
          type: string
          example: req_003
        data:
          $ref: '#/components/schemas/ChatMessageVO'
        errorName:
          type: string
          example: ""

    ChatStreamRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
        format:
          type: string
          enum: [plain, markdown]
          default: plain
        needThinking:
          type: boolean
          default: true
        modelId:
          type: string
        systemPrompt:
          type: string
        temperature:
          type: number
          format: float
        maxTokens:
          type: integer
        topP:
          type: number
          format: float
        clientMessageId:
          type: string
          description: Client-side message identity for dedupe tracking
        idempotencyKey:
          type: string
          description: Request idempotency key

    TokenUsage:
      type: object
      properties:
        promptTokens:
          type: integer
        completionTokens:
          type: integer
        totalTokens:
          type: integer

    ChatStreamDeltaData:
      type: object
      properties:
        chunk:
          type: string
        index:
          type: integer
        messageId:
          type: integer
          format: int64

    ChatStreamDoneData:
      type: object
      properties:
        finishReason:
          type: string
          enum: [stop, length, content_filter, error]
        usage:
          $ref: '#/components/schemas/TokenUsage'

    ChatStreamEvent:
      type: object
      required: [streamId, requestId, code, msg]
      properties:
        streamId:
          type: string
        requestId:
          type: string
        code:
          type: string
        msg:
          type: string
        data:
          oneOf:
            - $ref: '#/components/schemas/ChatStreamDeltaData'
            - $ref: '#/components/schemas/ChatStreamDoneData'

    MessageAttachment:
      type: object
      required: [type, uri]
      properties:
        type:
          type: string
          enum: [image, audio, video, file]
        uri:
          type: string
        mimeType:
          type: string
        size:
          type: integer
          format: int64
        metadata:
          type: object
          additionalProperties: true

    GenerationOptions:
      type: object
      properties:
        modelId:
          type: string
        systemPrompt:
          type: string
        temperature:
          type: number
          format: float
        maxTokens:
          type: integer
        topP:
          type: number
          format: float
        needThinking:
          type: boolean

    RichChatMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
        format:
          type: string
          enum: [plain, markdown]
          default: plain
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/MessageAttachment'
        quoteMessageId:
          type: integer
          format: int64
        clientMessageId:
          type: string
        idempotencyKey:
          type: string
        generationOptions:
          $ref: '#/components/schemas/GenerationOptions'
