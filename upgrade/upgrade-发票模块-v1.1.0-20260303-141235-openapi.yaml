openapi: 3.0.3
info:
  title: OpenChat Invoice Title Upgrade API
  version: 1.1.0
  description: |
    Upgrade contract for invoice title management domain.
    This is distinct from invoice-document workflow APIs.
servers:
  - url: https://api.example.com
    description: Production placeholder
  - url: https://staging-api.example.com
    description: Staging placeholder
tags:
  - name: InvoiceTitleUpgrade
    description: User invoice title management APIs
paths:
  /app/v3/api/user/invoice-titles:
    get:
      tags: [InvoiceTitleUpgrade]
      summary: List user invoice titles
      operationId: listInvoiceTitles
      responses:
        '200':
          description: Invoice title list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlusApiResultListInvoiceTitleVO'
    post:
      tags: [InvoiceTitleUpgrade]
      summary: Create invoice title
      operationId: createInvoiceTitle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceTitleCreateForm'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlusApiResultInvoiceTitleVO'

  /app/v3/api/user/invoice-titles/{id}:
    parameters:
      - $ref: '#/components/parameters/InvoiceTitleId'
    put:
      tags: [InvoiceTitleUpgrade]
      summary: Update invoice title
      operationId: updateInvoiceTitle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceTitleUpdateForm'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlusApiResultInvoiceTitleVO'
    delete:
      tags: [InvoiceTitleUpgrade]
      summary: Delete invoice title
      operationId: deleteInvoiceTitle
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlusApiResultVoid'

  /app/v3/api/user/invoice-titles/{id}/default:
    put:
      tags: [InvoiceTitleUpgrade]
      summary: Set default invoice title
      operationId: setDefaultInvoiceTitle
      parameters:
        - $ref: '#/components/parameters/InvoiceTitleId'
      responses:
        '200':
          description: Default updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlusApiResultInvoiceTitleVO'

components:
  parameters:
    InvoiceTitleId:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    InvoiceTitleVO:
      type: object
      required: [id, type, title]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [personal, company]
        title:
          type: string
        taxNo:
          type: string
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InvoiceTitleCreateForm:
      type: object
      required: [type, title]
      properties:
        type:
          type: string
          enum: [personal, company]
        title:
          type: string
        taxNo:
          type: string
        isDefault:
          type: boolean

    InvoiceTitleUpdateForm:
      type: object
      properties:
        type:
          type: string
          enum: [personal, company]
        title:
          type: string
        taxNo:
          type: string
        isDefault:
          type: boolean

    PlusApiResultInvoiceTitleVO:
      type: object
      required: [code, msg, requestId, data]
      properties:
        code:
          type: string
          example: '2000'
        msg:
          type: string
          example: ok
        requestId:
          type: string
          example: req_invoice_title_001
        data:
          $ref: '#/components/schemas/InvoiceTitleVO'
        errorName:
          type: string
          example: ''

    PlusApiResultListInvoiceTitleVO:
      type: object
      required: [code, msg, requestId, data]
      properties:
        code:
          type: string
          example: '2000'
        msg:
          type: string
          example: ok
        requestId:
          type: string
          example: req_invoice_title_002
        data:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceTitleVO'
        errorName:
          type: string
          example: ''

    PlusApiResultVoid:
      type: object
      required: [code, msg, requestId, data]
      properties:
        code:
          type: string
          example: '2000'
        msg:
          type: string
          example: ok
        requestId:
          type: string
          example: req_invoice_title_003
        data:
          type: object
          additionalProperties: true
        errorName:
          type: string
          example: ''
